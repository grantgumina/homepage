<!DOCTYPE HTML>
<html>
	<head>
		<title>{{ page.title }} | Grant Gumina</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="https://fonts.googleapis.com/css?family=Crimson+Text" rel="stylesheet">
		<link rel="stylesheet" href="/assets/css/main.css"/>
		{% seo %}
	</head>
	<body>

		<div class="container">
			<header class="header">
				<h1><a href="/" style="text-decoration: none; color: inherit;">Grant Gumina</a></h1>
			</header>

			<article class="writing">
				<h2>{{ page.title }}</h2>
				{% if page.date %}
				<p class="writing-date">{{ page.date | date: "%B %-d, %Y" }}</p>
				{% endif %}
				{% if page.description %}
				<p class="writing-description">{{ page.description }}</p>
				{% endif %}

				<div class="writing-content">
					{{ content }}
				</div>
			</article>

			<p class="nav">
				<a href="/writings/">All Writings</a>
			</p>
		</div>

	</body>
</html>
